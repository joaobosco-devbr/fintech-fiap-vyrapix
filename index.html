<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VyraPix - Login</title>
  <meta name="description" content="Acesse sua conta VyraPix com segurança.">
  <link rel="icon" href="./image/favicon.png" type="image/png">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236d28d9'/><text y='.9em' font-size='70' x='50%' dominant-baseline='middle' text-anchor='middle' fill='white'>V</text></svg>" type="image/svg+xml">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">
  <div id="toast" class="hidden"></div>

  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-violet-700">VyraPix</h1>
      <p class="text-gray-500">Acessar Conta</p>
    </div>

    <form action="#" method="get">
      <div class="mb-4">
        <label for="login-email" class="block text-sm font-medium mb-2">E-mail ou CPF</label>
        <input
          id="login-email"
          name="email"
          type="text"
          class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-violet-400 focus:outline-none"
          placeholder="Digite seu e-mail ou CPF"
          required>
      </div>

      <div class="mb-4">
        <label for="login-password" class="block text-sm font-medium mb-2">Senha</label>
        <div class="relative">
          <input
            id="login-password"
            name="senha"
            type="password"
            class="w-full border rounded-lg p-3 pr-12 focus:ring-2 focus:ring-violet-400 focus:outline-none"
            placeholder="Digite sua senha"
            required>
          <button
            type="button"
            onclick="toggleSenha('login-password', this)"
            aria-label="Mostrar ou ocultar senha"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-violet-700 transition focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="flex justify-between text-sm mb-6">
        <a href="recuperar.html" class="text-violet-700 hover:underline">Esqueceu sua senha?</a>
        <a href="cadastro.html" class="text-violet-700 hover:underline">Criar conta</a>
      </div>

      <button
        type="submit"
        class="block w-full bg-violet-700 text-white py-3 rounded-lg hover:bg-violet-800 transition">
        Entrar
      </button>
    </form>
  </div>

  <script>
    function toggleSenha(id, btn) {
      const input = document.getElementById(id);
      const mostrar = input.type === 'password';
      input.type = mostrar ? 'text' : 'password';
      btn.style.color = mostrar ? '#6d28d9' : '';
    }

    function mostrarToast(msg, tipo) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'fixed top-5 right-5 z-50 px-5 py-3 rounded-xl shadow-lg text-sm font-semibold transition-all duration-300 '
        + (tipo === 'sucesso'
          ? 'bg-green-100 text-green-800 border border-green-300'
          : 'bg-red-100 text-red-800 border border-red-300');
      setTimeout(() => { toast.className = 'hidden'; }, 3000);
    }

    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const senha = document.getElementById('login-password').value;
      if (!email || !senha) { mostrarToast('Preencha todos os campos.', 'erro'); return; }
      if (senha.length < 6) { mostrarToast('Senha deve ter ao menos 6 caracteres.', 'erro'); return; }
      mostrarToast('Login bem-sucedido', 'sucesso');
      setTimeout(() => window.location.href = 'dashboard.html', 1500);
    });
  </script>
</body>
</html>
